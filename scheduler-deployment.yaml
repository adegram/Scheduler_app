apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-deployment
  labels:
    app: scheduler
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler-app
        image: scheduler-app:latest
        ports:
        - containerPort: 4045

---

apiVersion: v1
kind: Service
metadata:
  name: scheduler-service
spec:
  selector:
    app: scheduler
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4045
      nodePort: 30300
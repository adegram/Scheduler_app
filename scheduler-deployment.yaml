apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-deployment
  labels:
    app: scheduler
spec:
  replicas: 4
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler-app
        image: adehorizon/scheduler-app:v2.1
        ports:
        - containerPort: 4045


---

apiVersion: v1
kind: Service
metadata:
  name: scheduler-service
spec:
  selector:
    app: scheduler
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4045
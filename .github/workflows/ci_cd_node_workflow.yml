name: Node.js CI/CD

on:
  push:
    branches:
      - main
        
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
      # Set the working directory globally for all 'run' steps in this job
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build --if-present
      
      - name: Upload artifacts #options to upload build/test artifacts for later jobs
        uses: actions/upload-artifact@v7
        with:
          name: node-app-artifacts
          path: .


  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: . # Specify the build context (e.g., the directory containing the Dockerfile)
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }} /adehorizon/scheduler-app:v2
            ${{ secrets.DOCKER_USERNAME }} /adehorizon/scheduler-app:${{ github.sha }}



  deploy-AWS-eks:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to EKS cluster (update kubeconfig)
        run: |
          aws eks update-kubeconfig --region us-east-1 --name node-app-prod-us-east 

      - name: Verify kubectl access
        run: kubectl get nodes

      - name: Deploy to EKS  
        run: kubectl apply -f scheduler-deployment.yaml

      - name: Verify deployment  
        run: kubectl get deployments

      # - name: Monitor & log
      #   run: kubectl logs -l app=scheduler
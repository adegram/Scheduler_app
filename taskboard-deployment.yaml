apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskboard-deployment
  labels:
    app: taskboard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskboard
  template:
    metadata:
      labels:
        app: taskboard
    spec:
      containers:
      - name: app-taskboard
        image: taskboard-app:1.0
        ports:
        - containerPort: 4045

---

apiVersion: v1
kind: Service
metadata:
  name: taskboard-service
spec:
  selector:
    app: taskboard
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4045
      nodePort: 30300
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCHEDULER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #2a2a2a;
      --border-hi: #3f3f3f;
      --amber:     #f0a500;
      --amber-dim: #7a5200;
      --red:       #e03c3c;
      --green:     #3cce82;
      --blue:      #3c8ce0;
      --text:      #e8e8e8;
      --muted:     #666;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── SCANLINE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky; top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--amber);
      letter-spacing: .25em;
      display: flex; align-items: center; gap: .6rem;
    }
    .logo .blink {
      width: 10px; height: 18px;
      background: var(--amber);
      display: inline-block;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .header-right {
      display: flex; align-items: center; gap: 1.5rem;
    }
    .stat-pill {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: .25rem .65rem;
      letter-spacing: .08em;
    }
    #uptime { color: var(--green); }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── ADD TASK BAR ── */
    .add-bar {
      display: flex; gap: .75rem;
      margin-bottom: 2.5rem;
      border: 1px solid var(--border-hi);
      padding: .75rem 1rem;
      background: var(--surface);
      transition: border-color .2s;
    }
    .add-bar:focus-within { border-color: var(--amber); }

    .add-bar input {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: .9rem;
      letter-spacing: .04em;
    }
    .add-bar input::placeholder { color: var(--muted); }

    .priority-select {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: .75rem;
      padding: .2rem .5rem;
      cursor: pointer;
      letter-spacing: .05em;
    }
    .priority-select:focus { outline: none; border-color: var(--amber); }
    .priority-select option { background: #111; color: var(--text); }

    .btn-add {
      background: var(--amber);
      color: #000;
      border: none;
      padding: .35rem 1.1rem;
      font-family: var(--mono);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-add:hover { background: #ffc533; }
    .btn-add:active { transform: scale(.97); }

    /* ── COLUMNS ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .column {
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .column-header {
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .column-label {
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    .col-todo    .column-label { color: var(--muted); }
    .col-wip     .column-label { color: var(--blue); }
    .col-done    .column-label { color: var(--green); }

    .col-count {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      background: #1a1a1a;
      padding: .1rem .45rem;
      border: 1px solid var(--border);
    }

    .task-list {
      padding: .75rem;
      display: flex; flex-direction: column; gap: .6rem;
      min-height: 120px;
    }

    /* ── TASK CARD ── */
    .task-card {
      background: #171717;
      border: 1px solid var(--border);
      padding: .75rem;
      display: flex; flex-direction: column; gap: .5rem;
      animation: slideIn .25s ease;
      transition: border-color .15s, transform .15s;
    }
    .task-card:hover { border-color: var(--border-hi); transform: translateX(3px); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }

    .task-title {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }

    .badge {
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .1em;
      padding: .15rem .4rem;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-high   { color: var(--red);   border-color: var(--red);   }
    .badge-medium { color: var(--amber); border-color: var(--amber-dim); }
    .badge-low    { color: var(--muted); border-color: var(--border); }

    .task-actions {
      display: flex; align-items: center; gap: .5rem;
    }

    .task-time {
      font-family: var(--mono);
      font-size: .62rem;
      color: var(--muted);
      flex: 1;
    }

    .btn-move, .btn-del {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: .65rem;
      padding: .2rem .5rem;
      cursor: pointer;
      letter-spacing: .05em;
      transition: all .15s;
    }
    .btn-move:hover { border-color: var(--amber); color: var(--amber); }
    .btn-del:hover  { border-color: var(--red);   color: var(--red); }

    /* ── EMPTY STATE ── */
    .empty {
      font-family: var(--mono);
      font-size: .7rem;
      color: #333;
      text-align: center;
      padding: 2rem 1rem;
      letter-spacing: .08em;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: .75rem 2rem;
      font-family: var(--mono);
      font-size: .65rem;
      color: #333;
      display: flex; gap: 2rem;
      letter-spacing: .06em;
    }
    footer span { color: var(--muted); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: var(--amber);
      color: #000;
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: .08em;
      padding: .5rem 1rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 700px) {
      .board { grid-template-columns: 1fr; }
      header { padding: 0 1rem; }
      main   { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">TASKBOARD <span class="blink"></span></div>
  <div class="header-right">
    <div class="stat-pill">PORT: 4045</div>
    <div class="stat-pill">UPTIME: <span id="uptime">--</span></div>
    <div class="stat-pill">TASKS: <span id="total-count">0</span></div>
  </div>
</header>

<main>
  <div class="add-bar">
    <input id="task-input" type="text" placeholder="// new task description..." maxlength="120" />
    <select class="priority-select" id="priority-sel">
      <option value="high">HIGH</option>
      <option value="medium" selected>MED</option>
      <option value="low">LOW</option>
    </select>
    <button class="btn-add" id="btn-add">+ ADD</button>
  </div>

  <div class="board">
    <div class="column col-todo">
      <div class="column-header">
        <span class="column-label">TODO</span>
        <span class="col-count" id="cnt-todo">0</span>
      </div>
      <div class="task-list" id="list-todo"></div>
    </div>

    <div class="column col-wip">
      <div class="column-header">
        <span class="column-label">IN PROGRESS</span>
        <span class="col-count" id="cnt-in-progress">0</span>
      </div>
      <div class="task-list" id="list-in-progress"></div>
    </div>

    <div class="column col-done">
      <div class="column-header">
        <span class="column-label">DONE</span>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div class="task-list" id="list-done"></div>
    </div>
  </div>
</main>

<footer>
  <span>NODE.JS + EXPRESS</span>
  <span>IN-MEMORY STORE</span>
  <span id="footer-time"></span>
</footer>

<div id="toast"></div>

<script>
  const STATUSES = ['todo', 'in-progress', 'done'];
  const STATUS_LABELS = { 'todo': 'TODO', 'in-progress': 'IN PROGRESS', 'done': 'DONE' };

  function nextStatus(s) {
    const i = STATUSES.indexOf(s);
    return i < STATUSES.length - 1 ? STATUSES[i + 1] : null;
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) + ' ' +
           d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }

  function renderCard(task) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.dataset.id = task.id;

    const next = nextStatus(task.status);

    card.innerHTML = `
      <div class="task-top">
        <span class="task-title">${escHtml(task.title)}</span>
        <span class="badge badge-${task.priority}">${task.priority.toUpperCase()}</span>
      </div>
      <div class="task-actions">
        <span class="task-time">${formatTime(task.createdAt)}</span>
        ${next ? `<button class="btn-move" data-id="${task.id}" data-status="${next}">→ ${STATUS_LABELS[next]}</button>` : ''}
        <button class="btn-del" data-id="${task.id}">✕</button>
      </div>`;
    return card;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadTasks() {
    const res = await fetch('/api/tasks');
    const tasks = await res.json();

    const lists = { 'todo': [], 'in-progress': [], 'done': [] };
    tasks.forEach(t => (lists[t.status] || lists['todo']).push(t));

    STATUSES.forEach(s => {
      const el = document.getElementById(`list-${s}`);
      const cnt = document.getElementById(`cnt-${s}`);
      el.innerHTML = '';
      if (lists[s].length === 0) {
        el.innerHTML = `<div class="empty">// empty</div>`;
      } else {
        lists[s].forEach(t => el.appendChild(renderCard(t)));
      }
      cnt.textContent = lists[s].length;
    });

    document.getElementById('total-count').textContent = tasks.length;
  }

  async function addTask() {
    const input = document.getElementById('task-input');
    const priority = document.getElementById('priority-sel').value;
    const title = input.value.trim();
    if (!title) return;

    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, priority }),
    });
    input.value = '';
    toast('TASK ADDED');
    loadTasks();
  }

  document.getElementById('btn-add').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.addEventListener('click', async e => {
    if (e.target.classList.contains('btn-move')) {
      const { id, status } = e.target.dataset;
      await fetch(`/api/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      toast(`MOVED → ${STATUS_LABELS[status]}`);
      loadTasks();
    }

    if (e.target.classList.contains('btn-del')) {
      const { id } = e.target.dataset;
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      toast('TASK REMOVED');
      loadTasks();
    }
  });

  // Uptime polling
  async function pollHealth() {
    try {
      const res = await fetch('/health');
      const data = await res.json();
      const secs = Math.floor(data.uptime);
      const h = String(Math.floor(secs / 3600)).padStart(2,'0');
      const m = String(Math.floor((secs % 3600) / 60)).padStart(2,'0');
      const s = String(secs % 60).padStart(2,'0');
      document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
    } catch {}
  }

  // Footer clock
  function updateClock() {
    document.getElementById('footer-time').textContent =
      new Date().toUTCString().replace(' GMT','Z');
  }

  loadTasks();
  pollHealth();
  setInterval(pollHealth, 5000);
  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
